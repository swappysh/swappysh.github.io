<header class="header">
    <span class="header__inner">
        {{ partial "logo.html" . }}

        <span class="header__right">
            {{- if len .Site.Menus }}
                {{ partial "menu.html" . }}
                <button type="button" class="menu-trigger" aria-label="Open menu" aria-expanded="false" aria-controls="main-menu">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M0 0h24v24H0z" fill="none"/>
                        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                    </svg>
                </button>
            {{- end }}

            {{- if .Site.Params.EnableThemeToggle }}
                <button type="button" class="theme-toggle not-selectable" aria-label="Toggle dark or light theme">
                    {{ partial "theme-toggle-icon.html" . }}
                </button>
            {{- end }}
        </span>
    </span>
</header>
