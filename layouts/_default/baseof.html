<!DOCTYPE html>
<html lang="{{ .Site.Language }}">
    <head>
        {{ partial "head.html" . }}
    </head>

    {{ block "body" . }}
        <body>
    {{ end }}
        <a href="#main" class="skip-link screen-reader-text">Skip to main content</a>
        <div class="container">
            {{ partial "header.html" . }}

            <div class="content" id="main">
                {{ block "main" . }}{{ end }}
            </div>

            {{ block "footer" . }}
                {{ partial "footer.html" . }}
            {{ end }}
        </div>

        <a href="#" class="back-to-top" aria-label="Back to top" title="Back to top">↑</a>

        {{ partial "javascript.html" . }}
    </body>
</html>
